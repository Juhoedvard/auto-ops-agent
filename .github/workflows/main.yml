name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  filter:
    # Efficiently detects which directory was changed to skip unnecessary builds
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  ci-backend:
    # Runs static analysis and dependency installs for the Python backend
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run Linting
        run: |
          # Placeholder: You can add 'ruff check .' or 'flake8' here
          echo "Running backend linting..."

  ci-frontend:
    # Handles linting and TypeScript checking for the React frontend
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Type Check
        run: |
          cd frontend
          npm run build # Vite's build includes tsc check, or use 'npx tsc'
      - name: Lint
        run: |
          cd frontend
          npx eslint .

  build-and-push:
    # Packages and pushes Docker images only if relevant CI jobs pass
    runs-on: ubuntu-latest
    needs: [filter, ci-backend, ci-frontend]
    if: |
      always() &&
      (needs.ci-backend.result == 'success' || needs.ci-backend.result == 'skipped') &&
      (needs.ci-frontend.result == 'success' || needs.ci-frontend.result == 'skipped') &&
      (needs.filter.outputs.backend == 'true' || needs.filter.outputs.frontend == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        if: needs.filter.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auto-ops-backend:latest

      - name: Build and push Frontend
        if: needs.filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auto-ops-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Trigger Render Backend Redeploy
        if: needs.filter.outputs.backend == 'true'
        run: curl -f -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Render Frontend Redeploy
        if: needs.filter.outputs.frontend == 'true'
        run: curl -f -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
