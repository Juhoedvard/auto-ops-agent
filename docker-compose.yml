services:
  backend:
    build: ./backend
    container_name: auto-ops-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload


  frontend:
    build: ./frontend
    container_name: auto-ops-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    environment:
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true 
      - WATCHPACK_POLLING=true 
    depends_on:
      - backend

    command: npm run dev -- --host 0.0.0.0